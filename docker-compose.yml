
services:
  web:
    build: .
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
    environment:
      - API_USERNAME=${API_USERNAME}
      - API_KEY=${API_KEY}
      - RAVELRY_USERNAME=${RAVELRY_USERNAME}
      - REDIS_URL=redis://cache:6379/0
      - SQLITE_DB_PATH=/app/data/stash.db
    depends_on:
      cache:
        condition: service_started

  cache:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

volumes:
  redisdata:
